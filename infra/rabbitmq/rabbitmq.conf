## RabbitMQ — Pizza Violations (mounted at /etc/rabbitmq/rabbitmq.conf)
## Docs: https://www.rabbitmq.com/docs/configure

## Memory: allow broker to use up to ~60% of RAM before flow control
vm_memory_high_watermark.relative = 0.6

## Disk free space limit (relative) — avoid blocking publishes on small dev disks
disk_free_limit.relative = 1.5

## Heartbeats (seconds) — stable connections over Docker networks
heartbeat = 60
